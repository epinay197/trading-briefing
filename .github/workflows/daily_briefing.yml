name: Daily Trading Briefing

on:
  schedule:
    # London session — 3:30 AM ET (covers EDT UTC-4 and EST UTC-5)
    - cron: '30 7 * * 1-5'    # 3:30 AM EDT (summer, UTC-4)
    - cron: '30 8 * * 1-5'    # 3:30 AM EST (winter, UTC-5)
    # US pre-market — 7:55 AM ET (covers EDT UTC-4 and EST UTC-5)
    - cron: '55 11 * * 1-5'   # 7:55 AM EDT (summer, UTC-4)
    - cron: '55 12 * * 1-5'   # 7:55 AM EST (winter, UTC-5)

  workflow_dispatch:
    inputs:
      force:
        description: 'Generate briefing even on market-closed days (--force)'
        required: false
        default: 'false'
        type: boolean
      session:
        description: 'Session to generate'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - us
          - london

permissions:
  contents: write    # commit docs/ back to repo
  pages:   write     # deploy to GitHub Pages
  id-token: write    # OIDC token for Pages deployment

# Only one Pages deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Detect session (london = before 6 AM ET, us = after) ─────────────────
      - name: Detect session
        id: session
        run: |
          DATE=$(TZ=America/New_York date +%Y-%m-%d)
          echo "date=$DATE" >> $GITHUB_OUTPUT

          # Manual override via workflow_dispatch input
          MANUAL="${{ inputs.session }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$MANUAL" != "auto" ] && [ -n "$MANUAL" ]; then
            echo "session=$MANUAL" >> $GITHUB_OUTPUT
            echo "Manually selected session: $MANUAL"
          else
            # Auto-detect: before 6 AM ET = London, 6 AM+ = US
            TOTAL=$(TZ=America/New_York date +"%-H * 60 + %-M" | bc)
            if [ "$TOTAL" -lt 360 ]; then
              echo "session=london" >> $GITHUB_OUTPUT
              echo "Auto-detected: London session ($(TZ=America/New_York date +%H:%M) ET)"
            else
              echo "session=us" >> $GITHUB_OUTPUT
              echo "Auto-detected: US session ($(TZ=America/New_York date +%H:%M) ET)"
            fi
          fi

      # ── Skip if this session's briefing already exists (duplicate cron guard) ─
      - name: Check for duplicate run
        id: dupe
        run: |
          DATE="${{ steps.session.outputs.date }}"
          SESSION="${{ steps.session.outputs.session }}"
          SUFFIX=""
          [ "$SESSION" = "london" ] && SUFFIX="_london"
          FILE="docs/briefing_${DATE}${SUFFIX}.html"
          if [ -f "$FILE" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Briefing $FILE already exists — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Will generate: $FILE"
          fi

      # ── Python setup ─────────────────────────────────────────────────────────
      - name: Set up Python
        if: steps.dupe.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        if: steps.dupe.outputs.skip != 'true'
        run: pip install -r requirements.txt

      # ── Generate briefing ────────────────────────────────────────────────────
      - name: Generate briefing
        if: steps.dupe.outputs.skip != 'true'
        env:
          MENTHORQ_EMAIL:    ${{ secrets.MENTHORQ_EMAIL }}
          MENTHORQ_PASSWORD: ${{ secrets.MENTHORQ_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NTFY_TOPIC:        ${{ secrets.NTFY_TOPIC }}
          PAGES_URL:         https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          TRADING_DIR:       ${{ github.workspace }}/docs
        run: |
          mkdir -p docs
          FLAGS="--session ${{ steps.session.outputs.session }}"
          if [ "${{ inputs.force }}" = "true" ]; then FLAGS="$FLAGS --force"; fi
          python daily_briefing.py $FLAGS

      # ── Commit briefing HTML to docs/ ─────────────────────────────────────────
      - name: Commit briefing to docs/
        if: steps.dupe.outputs.skip != 'true'
        run: |
          git config user.name  "Trading Briefing Bot"
          git config user.email "briefing-bot@noreply"
          git add docs/
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "briefing: ${{ steps.session.outputs.date }} (${{ steps.session.outputs.session }})" && git push

      # ── Deploy docs/ to GitHub Pages ──────────────────────────────────────────
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
